<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    see console

    <script>

        // Promises are functions that return a Promise object.
        // A promise object consists of two functions: resolve and reject

        function wait(ms){
            return new Promise(function(resolve, reject){
                console.log('starting to wait');
                return setTimeout(resolve, ms);
            });
        }

        const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
        // const wait = (ms) => {return new Promise(resolve => {return setTimeout(resolve, ms)})};

        wait(3*1000)
            .then(() => {
                console.log('3 seconds has passed');

                throw new Error('Not enough records.');

                return wait(1000);
            })
            .then(() => console.log('1 more second has passed'))
            .catch(err => console.error(err))
            .then(() => console.log('All done.'))
            .catch(err => console.error(err))
            .finally(() => {
                console.log('Finally Finished...');
            });

        Promise
            .all([wait(1000), wait(1000), wait(4000)])
            .then(() => console.log('Promise.all() finished.'));


        Promise
            .any([wait(1000), wait(1000), wait(4000)])
            .then(() => console.log('Promise.any() finished.'));

        console.log('loaded');
    </script>

</body>
</html>
